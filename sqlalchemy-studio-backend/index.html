<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Studio DB Viewer</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      .table {
        margin-bottom: 40px;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 10px;
      }

      .table h2 {
        margin: 0 0 10px 0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }

      th {
        background: #f5f5f5;
      }
    </style>
  </head>

  <body>
    <h1>Database Studio</h1>

    <div id="app"></div>

    <script>
      async function loadData() {
        const res = await fetch("http://localhost:9000/tables");
        const data = await res.json();

        const app = document.getElementById("app");
        app.innerHTML = "";

        data.forEach((table) => {
          const div = document.createElement("div");
          div.className = "table";

          let html = `<h2>${table.table}</h2>`;
          html += `
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Nullable</th>
            <th>Primary Key</th>
          </tr>
        </thead>
        <tbody>
    `;

          table.columns.forEach((col) => {
            html += `
        <tr>
          <td>${col.name}</td>
          <td>${JSON.stringify(col.type)}</td>
          <td>${col.nullable}</td>
          <td>${col.primary_key}</td>
        </tr>
      `;
          });

          html += "</tbody></table>";

          div.innerHTML = html;
          app.appendChild(div);
        });
      }

      loadData();
    </script>
  </body>
</html>
